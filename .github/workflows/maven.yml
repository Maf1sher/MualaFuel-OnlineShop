name: Java Unit Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Run ls
      # Komenda 'test' uruchamia tylko fazę testów (pomija budowanie pliku .jar)
      run: ls -l
      
    - name: Run Unit Tests with Maven
      # Komenda 'test' uruchamia tylko fazę testów (pomija budowanie pliku .jar)
      run: mvn test

    - name: Upload Test Reports
      # if: always() gwarantuje, że raporty z testów zostaną przesłane, 
      # nawet jeśli same testy zakończą się niepowodzeniem (co jest kluczowe do debugowania)
      if: always() 
      uses: actions/upload-artifact@v4
      with:
        name: maven-surefire-reports
        path: target/surefire-reports/
        retention-days: 14
